<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 1024 1024" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Security Guidance</title>
  <desc id="desc">A DotCraft robot with a security shield for lifecycle hook code review guidance.</desc>
  <defs>
    <linearGradient id="body" x1="279" y1="766" x2="736" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0284C7"/>
      <stop offset=".48" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="mark" x1="366" y1="694" x2="658" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0369A1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="yellow" x1="481" y1="174" x2="617" y2="713" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFCF11"/>
      <stop offset="1" stop-color="#F6B500"/>
    </linearGradient>
    <linearGradient id="shield" x1="692" y1="848" x2="932" y2="605" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#059669"/>
      <stop offset=".52" stop-color="#10B981"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#075985" flood-opacity=".16"/>
    </filter>
    <filter id="inner-lift" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#075985" flood-opacity=".1"/>
    </filter>
    <filter id="shield-lift" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity=".22"/>
    </filter>
  </defs>

  <g transform="translate(512 516) scale(.82) translate(-512 -512)">
    <g transform="translate(512 528) scale(1.3) translate(-512 -512)">
      <g filter="url(#soft-shadow)">
        <rect x="201" y="365" width="622" height="513" rx="151" fill="#fff"/>
        <rect x="145" y="472" width="136" height="256" rx="58" fill="#fff"/>
        <rect x="743" y="472" width="136" height="256" rx="58" fill="#fff"/>
        <rect x="438" y="270" width="148" height="182" rx="2" fill="#fff"/>
        <circle cx="512" cy="229" r="116" fill="#fff"/>
      </g>
      <g filter="url(#inner-lift)">
        <rect x="243" y="408" width="538" height="426" rx="113" fill="url(#body)"/>
        <rect x="188" y="514" width="90" height="171" rx="19" fill="url(#body)"/>
        <rect x="746" y="514" width="90" height="171" rx="19" fill="url(#body)"/>
        <rect x="479" y="337" width="66" height="119" rx="6" fill="url(#body)"/>
      </g>
      <rect x="295" y="464" width="434" height="315" rx="78" fill="#fff"/>
      <circle cx="512" cy="229" r="73" fill="url(#yellow)"/>
      <path d="M389 612h58" stroke="url(#mark)" stroke-width="30" stroke-linecap="round"/>
      <path d="M577 612h58" stroke="url(#mark)" stroke-width="30" stroke-linecap="round"/>
      <path d="M493 700h42" stroke="url(#yellow)" stroke-width="22" stroke-linecap="round"/>
    </g>
  </g>

  <g filter="url(#shield-lift)" transform="rotate(8 804 742)">
    <path d="M804 595c47 34 96 47 154 50v96c0 83-51 143-154 181-103-38-154-98-154-181v-96c58-3 107-16 154-50Z" fill="#fff"/>
    <path d="M804 625c39 26 80 37 126 40v76c0 62-38 110-126 145-88-35-126-83-126-145v-76c46-3 87-14 126-40Z" fill="url(#shield)"/>
    <path d="M742 754l37 37 82-94" stroke="#fff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M728 667c25-6 49-16 76-31 27 15 51 25 76 31" stroke="#D1FAE5" stroke-width="16" stroke-linecap="round" opacity=".82"/>
  </g>
</svg>
