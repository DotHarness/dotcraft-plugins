<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">DotCraft Unity plugin icon</title>
  <desc id="desc">A left-leaning DotCraft terminal robot with a Unity logo badge centered on its right side block.</desc>
  <defs>
    <linearGradient id="robot-blue" x1="246" y1="774" x2="698" y2="351" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2458f7"/>
      <stop offset=".48" stop-color="#5f82f7"/>
      <stop offset="1" stop-color="#8fa5ff"/>
    </linearGradient>
    <linearGradient id="robot-mark" x1="355" y1="687" x2="470" y2="553" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2257f5"/>
      <stop offset=".58" stop-color="#577df7"/>
      <stop offset="1" stop-color="#8ca2ff"/>
    </linearGradient>
    <linearGradient id="robot-yellow" x1="447" y1="196" x2="592" y2="721" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcf11"/>
      <stop offset="1" stop-color="#f6b500"/>
    </linearGradient>
    <filter id="robot-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0b3d62" flood-opacity=".18"/>
    </filter>
    <filter id="soft-lift" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#163a88" flood-opacity=".14"/>
    </filter>
    <filter id="badge-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0b3d62" flood-opacity=".22"/>
    </filter>
  </defs>

  <g transform="translate(-40 70) rotate(-7 512 612) scale(.9)">
    <g filter="url(#robot-shadow)">
      <rect x="201" y="365" width="622" height="513" rx="151" fill="#fff"/>
      <rect x="145" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="743" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="438" y="270" width="148" height="182" rx="2" fill="#fff"/>
      <circle cx="512" cy="229" r="116" fill="#fff"/>
    </g>
    <g filter="url(#soft-lift)">
      <rect x="243" y="408" width="538" height="426" rx="113" fill="url(#robot-blue)"/>
      <rect x="188" y="514" width="90" height="171" rx="19" fill="url(#robot-blue)"/>
      <rect x="746" y="514" width="90" height="171" rx="19" fill="url(#robot-blue)"/>
      <rect x="479" y="337" width="66" height="119" rx="6" fill="url(#robot-blue)"/>
