    <path d="M387 568 477 634 387 700" stroke="url(#robot-mark)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M531 696h116" stroke="url(#robot-yellow)" stroke-width="27" stroke-linecap="round"/>
  </g>

